<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Audio Test</title></head>
<body>
  <h2>测试1: raw URL</h2>
  <audio controls src="https://raw.githubusercontent.com/goodworkjeans-cmyk/mula-sakee/main/bgm.mp3"></audio>
  <h2>测试2: github.io URL</h2>
  <audio controls src="https://goodworkjeans-cmyk.github.io/mula-sakee/bgm.mp3"></audio>
  <h2>测试3: blob URL (base64)</h2>
  <audio id="test3" controls></audio>
  <script>
  fetch('https://raw.githubusercontent.com/goodworkjeans-cmyk/mula-sakee/main/bgm.mp3')
    .then(r=>r.blob())
    .then(b=>{document.getElementById('test3').src=URL.createObjectURL(b)})
    .catch(e=>{document.body.innerHTML+='fetch error:'+e.message})
  </script>
</body></html>
